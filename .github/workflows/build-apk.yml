name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REQUIRED_NODE_MAJOR: 22

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify Node version
        run: |
          which node
          node -v
          which npm
          npm -v
          NODE_MAJOR="$(node -p "process.versions.node.split('.')[0]")"
          if [ "$NODE_MAJOR" -lt "$REQUIRED_NODE_MAJOR" ]; then
            echo "Capacitor needs Node.js $REQUIRED_NODE_MAJOR or newer, but GitHub is using $(node -v)."
            exit 1
          fi

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: |
          node -e "const major = Number(process.versions.node.split('.')[0]); if (major < Number(process.env.REQUIRED_NODE_MAJOR)) { console.error(`Capacitor needs Node.js ${process.env.REQUIRED_NODE_MAJOR} or newer, but this step is using ${process.version}.`); process.exit(1); }"
          node ./node_modules/@capacitor/cli/bin/capacitor --version
          if [ ! -d "android" ]; then
            node ./node_modules/@capacitor/cli/bin/capacitor add android
          fi

      - name: Sync Capacitor
        run: |
          node -e "const major = Number(process.versions.node.split('.')[0]); if (major < Number(process.env.REQUIRED_NODE_MAJOR)) { console.error(`Capacitor needs Node.js ${process.env.REQUIRED_NODE_MAJOR} or newer, but this step is using ${process.version}.`); process.exit(1); }"
          node ./node_modules/@capacitor/cli/bin/capacitor sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/smart-snake-learn.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-snake-learn-apk
          path: output/smart-snake-learn.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: APK Build ${{ github.run_number }}
          files: output/smart-snake-learn.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
