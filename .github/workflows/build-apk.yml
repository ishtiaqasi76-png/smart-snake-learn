name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REQUIRED_NODE_MAJOR: 24

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Node.js 24
        run: |
          FILE="$(curl -fsSL https://nodejs.org/dist/latest-v24.x/SHASUMS256.txt | awk '/linux-x64.tar.xz$/ {print $2; exit}')"
          VERSION="${FILE#node-}"
          VERSION="${VERSION%-linux-x64.tar.xz}"
          curl -fsSLO "https://nodejs.org/dist/latest-v24.x/${FILE}"
          tar -xJf "${FILE}" -C "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/node-${VERSION}-linux-x64/bin" >> "$GITHUB_PATH"

      - name: Verify Node version
        run: |
          which node
          node -v
          which npm
          npm -v
          NODE_MAJOR="$(node -p "process.versions.node.split('.')[0]")"
          if [ "$NODE_MAJOR" -lt "$REQUIRED_NODE_MAJOR" ]; then
            echo "Capacitor needs Node.js $REQUIRED_NODE_MAJOR or newer, but GitHub is using $(node -v)."
            exit 1
          fi

      - name: Setup Java JDK 21
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-21-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64" >> "$GITHUB_ENV"
          echo "/usr/lib/jvm/java-21-openjdk-amd64/bin" >> "$GITHUB_PATH"

      - name: Setup Android SDK
        run: |
          ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "ANDROID_HOME=${ANDROID_HOME}" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=${ANDROID_HOME}" >> "$GITHUB_ENV"
          echo "${ANDROID_HOME}/platform-tools" >> "$GITHUB_PATH"
          echo "${ANDROID_HOME}/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: |
          node -e 'const major = Number(process.versions.node.split(".")[0]); if (major < Number(process.env.REQUIRED_NODE_MAJOR)) { console.error("Capacitor needs Node.js " + process.env.REQUIRED_NODE_MAJOR + " or newer, but this step is using " + process.version + "."); process.exit(1); }'
          node ./node_modules/@capacitor/cli/bin/capacitor --version
          if [ ! -d "android" ]; then
            node ./node_modules/@capacitor/cli/bin/capacitor add android
          fi

      - name: Sync Capacitor
        run: |
          node -e 'const major = Number(process.versions.node.split(".")[0]); if (major < Number(process.env.REQUIRED_NODE_MAJOR)) { console.error("Capacitor needs Node.js " + process.env.REQUIRED_NODE_MAJOR + " or newer, but this step is using " + process.version + "."); process.exit(1); }'
          node ./node_modules/@capacitor/cli/bin/capacitor sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/smart-snake-learn.apk

      - name: Create Release
        run: |
          gh release create "build-${{ github.run_number }}" output/smart-snake-learn.apk \
            --title "APK Build ${{ github.run_number }}" \
            --notes "Automated Android APK build."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
